---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="glitch" data-text="{{ page.title }}">{{ page.title }}</h1>
    <time class="post-date">{{ page.date | date: "%B %d, %Y" }}</time>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a href="{{ '/blog.html' | relative_url }}" class="back-link">&larr; Back to blog</a>
</article>
